<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In Your_name</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f; --surface: #111118; --border: #2a2a38;
      --red: #e8203a; --red-dim: #9b1528; --text: #f0f0f8; --muted: #6b6b88;
      --font-head: 'Bebas Neue', sans-serif;
      --font-body: 'Outfit', sans-serif;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden;
    }

    /* Animated bg grid */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.35;
      animation: gridShift 20s linear infinite;
    }
    @keyframes gridShift { to { background-position: 48px 48px; } }

    /* Red glow blob */
    body::after {
      content: '';
      position: fixed;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(232,32,58,0.12) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .login-wrap {
      position: relative; z-index: 1;
      width: 100%; max-width: 400px;
      padding: 1rem;
    }

    .login-logo {
      text-align: center;
      font-family: var(--font-head);
      font-size: 3.5rem;
      letter-spacing: 4px;
      color: var(--red);
      margin-bottom: 0.25rem;
    }
    .login-logo span { color: var(--text); }
    .login-sub {
      text-align: center;
      color: var(--muted);
      font-size: 0.8rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 2.5rem;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      backdrop-filter: blur(8px);
    }

    .field {
      margin-bottom: 1.25rem;
    }
    .field label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }
    .field input {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field input:focus {
      border-color: var(--red-dim);
      box-shadow: 0 0 0 3px rgba(232,32,58,0.1);
    }

    .error {
      background: rgba(232,32,58,0.12);
      border: 1px solid var(--red-dim);
      border-radius: 8px;
      padding: 0.65rem 1rem;
      color: var(--red);
      font-size: 0.85rem;
      margin-bottom: 1.25rem;
    }

    .btn-login {
      width: 100%;
      background: var(--red);
      border: none;
      border-radius: 8px;
      padding: 0.85rem;
      color: white;
      font-family: var(--font-head);
      font-size: 1.1rem;
      letter-spacing: 2px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 0.25rem;
    }
    .btn-login:hover { background: #c41830; }
    .btn-login:active { transform: scale(0.98); }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-logo">MANGA<span>VAULT</span></div>
    <div class="login-sub">Private Library</div>
    <div class="login-card">
      {% if error %}
      <div class="error">{{ error }}</div>
      {% endif %}
      <form method="POST">
        <div class="field">
          <label>Username</label>
          <input type="text" name="username" autocomplete="username" autofocus>
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" name="password" autocomplete="current-password">
        </div>
        <button class="btn-login" type="submit">ENTER VAULT</button>
      </form>
    </div>
  </div>
</body>
</html>
